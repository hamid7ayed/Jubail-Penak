<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>پینک</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA Support -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Estedad Font -->
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/estedad-font@v0.4.1/dist/Estedad-FD.css"
        rel="stylesheet" type="text/css" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="p-0">

  <!-- MAIN APP CONTAINER -->
  <div class="max-w-md mx-auto min-h-screen flex flex-col">

    <!-- Header -->
    <div class="text-center py-6 px-4">
      <h1 id="app-title" class="text-4xl font-bold text-white mb-1"></h1>
      <p id="app-subtitle" class="text-white text-sm opacity-90"></p>

      <div id="sync-status" class="mt-2 hidden">
        <button onclick="retrySyncNow()"
                class="bg-yellow-500 hover:bg-yellow-600 text-white text-xs px-3 py-1 rounded-full">
          ⏳ در انتظار همگام‌سازی - کلیک برای تلاش مجدد
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex justify-around text-white text-sm mb-4">
      <button id="tab-game" class="tab-active pb-2" onclick="showTab('game')">بازی</button>
      <button id="tab-stats" class="tab-inactive pb-2" onclick="showTab('stats')">آمار</button>
      <button id="tab-history" class="tab-inactive pb-2" onclick="showTab('history')">تاریخچه</button>
    </div>

    <!-- GAME PANEL -->
    <div id="panel-game" class="px-4">

      <!-- Place Selector -->
      <div class="glass mb-4">
        <label class="text-white text-sm mb-1 block">محل بازی</label>
        <button onclick="openPlaceSheet()"
                class="w-full bg-white/20 text-white py-2 rounded-lg touch-btn">
          انتخاب محل
        </button>
        <p id="selected-place" class="text-white text-xs mt-2 opacity-80"></p>
      </div>

      <!-- Team A -->
      <div class="glass mb-4">
        <h3 class="text-white font-bold mb-2">تیم A</h3>

        <button onclick="openPlayerSheet('A')"
                class="w-full bg-white/20 text-white py-2 rounded-lg touch-btn mb-3">
          انتخاب بازیکنان
        </button>

        <input id="scoreA" type="number" placeholder="امتیاز"
               class="score-input w-full bg-white/20 text-white py-2 rounded-lg touch-btn">
      </div>

      <!-- Team B -->
      <div class="glass mb-4">
        <h3 class="text-white font-bold mb-2">تیم B</h3>

        <button onclick="openPlayerSheet('B')"
                class="w-full bg-white/20 text-white py-2 rounded-lg touch-btn mb-3">
          انتخاب بازیکنان
        </button>

        <input id="scoreB" type="number" placeholder="امتیاز"
               class="score-input w-full bg-white/20 text-white py-2 rounded-lg touch-btn">
      </div>

      <!-- Save Game -->
      <button onclick="saveGame()"
              class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl touch-btn font-bold">
        ثبت نتیجه
      </button>
    </div>

    <!-- STATS PANEL -->
    <div id="panel-stats" class="hidden px-4 text-white">
      <div class="glass p-4 text-center">
        <p class="opacity-80">بخش آمار به‌زودی اضافه می‌شود.</p>
      </div>
    </div>

    <!-- HISTORY PANEL -->
    <div id="panel-history" class="hidden px-4">
      <div id="history-list"></div>
    </div>

  </div>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay"></div>

  <!-- PLAYER SELECTION SHEET -->
  <div id="player-sheet" class="bottom-sheet">
    <h3 class="text-lg font-bold mb-3">انتخاب بازیکنان</h3>
    <div id="player-list" class="mb-4"></div>

    <button onclick="closePlayerSheet()"
            class="w-full bg-gray-600 text-white py-2 rounded-lg touch-btn">
      بستن
    </button>
  </div>

  <!-- PLACE SELECTION SHEET -->
  <div id="place-sheet" class="bottom-sheet">
    <h3 class="text-lg font-bold mb-3">انتخاب محل</h3>
    <div id="place-list" class="mb-4"></div>

    <button onclick="closePlaceSheet()"
            class="w-full bg-gray-600 text-white py-2 rounded-lg touch-btn">
      بستن
    </button>
  </div>

  <!-- App Logic -->
  <script src="app.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/Jubail-Penak/service-worker.js");
    }
  </script>

</body>
</html>
